<footer class="footer">
  <div class="footer-inner">
    <a class="brand" routerLink="/" aria-label="Bee Goodies home">
      <img src="/logo.svg" alt="Bee Goodies Logo" class="brand-logo" />
      <span class="brand-name">Bee Goodies</span>
    </a>

    <nav class="footer-nav" aria-label="Footer">
      @for (link of links; track link.path) {
        <a class="footer-link" [routerLink]="link.path">{{ link.label }}</a>
      }
    </nav>

    <div class="copyright">© {{ year }} Bee Goodies</div>
  </div>
</footer>
