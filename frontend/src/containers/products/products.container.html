<main class="container">
  <header class="header">
    <h1 class="title">Our Goods</h1>
  </header>

  <mat-tab-group class="tabs" animationDuration="100ms">
    <mat-tab label="Candles">
      <div class="tab-panel">
        <div class="products-grid">
          @for (p of candles; track p.id) {
            <app-product-card
              [title]="p.title"
              [photoUrl]="p.photoUrl"
              [price]="p.price"
              (addToCart)="onAddToCart(p)"
            ></app-product-card>
          }
        </div>
      </div>
    </mat-tab>

    <mat-tab label="Decorations">
      <div class="tab-panel">
        <app-empty-state
          title="No items yet"
          description="We’re working on it. Check back soon for new pieces."
          icon="format_paint"
        ></app-empty-state>
      </div>
    </mat-tab>
    <mat-tab label="Others">
      <div class="tab-panel">
        <app-empty-state
          title="No items yet"
          description="We’re working on it. Check back soon for new pieces."
          icon="format_paint"
        ></app-empty-state>
      </div>
    </mat-tab>
  </mat-tab-group>
</main>
