<main class="page">
  <header class="page-header">
    <h1>Products</h1>
    <p>Browse our favorites.</p>
  </header>

  <section class="grid">
    @for (p of products; track p.id) {
      <app-product-card
        [title]="p.title"
        [photoUrl]="p.photoUrl"
        [price]="p.price"
        (addToCart)="onAddToCart(p)"
      />
    }
  </section>
</main>
